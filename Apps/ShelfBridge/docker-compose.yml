name: shelfbridge
services:
  shelfbridge:
    image: ghcr.io/rohit-purandare/shelfbridge:v1.23.1
    container_name: shelfbridge
    restart: unless-stopped
    command: npm start
    environment:
      - NODE_ENV=production
      - SHELFBRIDGE_USER_0_ID=Your_Name
      - SHELFBRIDGE_USER_0_ABS_URL=http://your-audiobookshelf-ip:port
      - SHELFBRIDGE_USER_0_ABS_TOKEN=Paste_Your_ABS_Token_Here
      - SHELFBRIDGE_USER_0_HARDCOVER_TOKEN=Paste_Your_Hardcover_Token_Here
    healthcheck:
      test: ["CMD", "npm", "run", "test:native"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 10s
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/config
        target: /app/config
      - type: bind
        source: /DATA/AppData/$AppID/data
        target: /app/data
    x-casaos:
      envs:
        - container: SHELFBRIDGE_USER_0_ID
          description:
            en_US: Your sync identifier (e.g., Iza)
        - container: SHELFBRIDGE_USER_0_ABS_URL
          description:
            en_US: Audiobookshelf Server URL (e.g., http://10.0.0.85:8282)
        - container: SHELFBRIDGE_USER_0_ABS_TOKEN
          description:
            en_US: Audiobookshelf API Token
        - container: SHELFBRIDGE_USER_0_HARDCOVER_TOKEN
          description:
            en_US: Hardcover API Token
      volumes:
        - container: /app/config
          description:
            en_US: Configuration directory
        - container: /app/data
          description:
            en_US: Data directory

x-casaos:
  architectures:
    - amd64
    - arm64
  main: shelfbridge
  author: Izanagi11
  category: Automation
  title:
    en_US: ShelfBridge
  tagline:
    en_US: Syncs Audiobookshelf with Hardcover
  description:
    en_US: "A background service that bridges Audiobookshelf and Hardcover to automatically sync your reading progress.\n\n⚠️ IMPORTANT: Before installing (or by clicking Settings after), you MUST fill out your API tokens and server URL in the Environment Variables section."
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/ShelfBridge/4729112.png