name: palworld-server
services:
  palworld:
    image: thijsvanloef/palworld-server-docker:latest
    container_name: palworld-server
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - target: 8211
        published: "8211"
        protocol: udp
      - target: 27015
        published: "27015"
        protocol: udp
      - target: 8212
        published: "8212"
        protocol: tcp
    environment:
      - PUID=1000
      - PGID=1000
      - PORT=8211
      - PLAYERS=20
      - SERVER_PASSWORD=Zen Division
      - MULTITHREADING=true
      - REST_API_ENABLED=true
      - REST_API_PORT=8212
      - TZ=America/Denver
      - ADMIN_PASSWORD=MikasaIzanami#11
      - COMMUNITY=true
      - SERVER_NAME=Zen's Palworld Server
      - SERVER_DESCRIPTION=Palworld Server hosted by Iza
      - CROSSPLAY_PLATFORMS=(Steam,Xbox,PS5,Mac)
      - BACKUP_ENABLED=true
      - BACKUP_CRON_EXPRESSION=0 * * * *
      - UPDATE_ON_BOOT=true
      - DELETE_OLD_BACKUPS=true
      - OLD_BACKUP_DAYS=14
      - AUTO_UPDATE_ENABLED=true
    volumes:
      - type: bind
        source: /DATA/AppData/$AppID/palworld
        target: /palworld/
      - type: bind
        source: /media/Hitachi5600/PalworldBackups
        target: /palworld/backups/
    x-casaos:
      envs:
        - container: SERVER_NAME
          description:
            en_US: The name of your server in the server browser
        - container: SERVER_PASSWORD
          description:
            en_US: Game password (leave blank for no password)
        - container: ADMIN_PASSWORD
          description:
            en_US: Admin/RCON password for in-game commands
        - container: PLAYERS
          description:
            en_US: Maximum number of concurrent players
      ports:
        - container: "8211"
          description:
            en_US: Palworld Game Port (UDP)
        - container: "27015"
          description:
            en_US: Community Server Port (UDP)
        - container: "8212"
          description:
            en_US: REST API Port (TCP) - DO NOT PORT FORWARD
      volumes:
        - container: /palworld/
          description:
            en_US: Game saves and server data (SSD)
        - container: /palworld/backups/
          description:
            en_US: Compressed automatic backups (HDD)

x-casaos:
  architectures:
    - amd64
  main: palworld
  author: thijsvanloef
  category: Gaming
  title:
    en_US: Palworld Server
  tagline:
    en_US: Feature-rich dedicated server wrapper
  description:
    en_US: "The community-favorite Palworld dedicated server wrapper. Automatically updates the game on boot and allows you to configure the server directly from the ZimaOS Settings menu."
  icon: https://raw.githubusercontent.com/Izanagi11/IzaServerAppstore/refs/heads/main/Apps/PalworldServer/logo.jpg